name: Tor Traffic Runner

on:
  workflow_dispatch:

jobs:
  run-tor-traffic:
    runs-on: ubuntu-latest

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      # PROXY_SERVER:   ${{ secrets.PROXY_SERVER }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js + npm cache ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # ── 3. Playwright browser cache ──────────────────────────────────────────
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # ── 4. Install npm dependencies ──────────────────────────────────────────
      - name: Install project dependencies
        run: npm ci

      # ── 5. Install Playwright browsers ONLY on cache miss ────────────────────
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      # ── 6. Install Tor (2 instances: ports 9050+9051 and 9150+9151) ──────────
      - name: Install Tor
        run: sudo apt-get update && sudo apt-get install -y tor

      - name: Configure and start 2 Tor instances
        run: |
          # ── Instance 1: SOCKS 9050 / Control 9051 ──
          sudo bash -c 'cat > /etc/tor/torrc <<EOF
          SocksPort 9050
          ControlPort 9051
          HashedControlPassword 16:78A6F4AD4B0ED8B26DEFE0CB58FAFDE0C7E0A64EB67E4AC2BCCE69EAE
          DataDirectory /var/lib/tor
          EOF'

          # ── Instance 2: SOCKS 9150 / Control 9151 ──
          sudo mkdir -p /var/lib/tor2
          sudo chown debian-tor:debian-tor /var/lib/tor2
          sudo bash -c 'cat > /etc/tor/torrc2 <<EOF
          SocksPort 9150
          ControlPort 9151
          HashedControlPassword 16:78A6F4AD4B0ED8B26DEFE0CB58FAFDE0C7E0A64EB67E4AC2BCCE69EAE
          DataDirectory /var/lib/tor2
          PidFile /var/run/tor/tor2.pid
          EOF'

          # Start both instances
          sudo service tor restart
          sudo -u debian-tor tor -f /etc/tor/torrc2 --defaults-torrc /dev/null &

          # Wait for both SOCKS ports to be ready
          echo "Waiting for Tor instances to be ready..."
          timeout 60 bash -c 'until nc -z 127.0.0.1 9050; do sleep 1; done'
          timeout 60 bash -c 'until nc -z 127.0.0.1 9150; do sleep 1; done'
          echo "Both Tor instances are up ✅"

      # ── 7. Run tor_traffic.js (xvfb pre-installed on ubuntu-latest) ──────────
      # Note: 2 tor instances run inside the script (torInstances array)
      - name: Run Tor traffic bot
        run: xvfb-run --auto-servernum node tor_traffic.js work=3
