name: Matrix Traffic Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ── Step 1: Dynamically generate a JSON array [1, 2, ..., 256] ──────────────
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.set-matrix.outputs.chunks }}
    steps:
      - name: Generate chunk list (1 to 256)
        id: set-matrix
        run: |
          echo "chunks=$(python3 -c 'import json; print(json.dumps(list(range(1, 257))))')" >> $GITHUB_OUTPUT

  # ── Step 2: Run traffic script for every chunk in parallel ──────────────────
  run-traffic-command:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.generate-matrix.outputs.chunks) }}

    # No proxy secrets needed — local network is used directly
    # env:
    #   PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
    #   PROXY_PORT:     ${{ secrets.PROXY_PORT }}
    #   PROXY_SERVER:   ${{ secrets.PROXY_SERVER }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js + npm cache (uses package-lock.json as the cache key) ────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
  # 1. Check the public IP of this runner via httpbin
      #    Uses an async IIFE so Node doesn't exit before the Promise resolves
      - name: Check and record current IP
        run: |
          node -e "
            (async () => {
              const chunk = '${{ matrix.chunk }}';
              try {
                const res  = await fetch('https://httpbin.org/ip');
                const data = await res.json();
                const ip   = data.origin;
                console.log('Chunk ' + chunk + ' => IP: ' + ip);
                require('fs').writeFileSync('ip-result.txt', ip);
              } catch (e) {
                console.error('Failed to fetch IP:', e.message);
                process.exit(1);
              }
            })();
          "
      # ── 3. Playwright browser cache ──────────────────────────────────────────
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # ── 4. Install npm dependencies (fast when ~/.npm is cached) ─────────────
      - name: Install project dependencies
        run: npm ci

      # ── 5. Install Playwright browsers ONLY on cache miss ────────────────────
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      # ── 6. Install xvfb (virtual display for headful Chromium on Linux) ──────
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # ── 7. Run the traffic script for this chunk ─────────────────────────────
      - name: Run matrix traffic (chunk ${{ matrix.chunk }})
        run: xvfb-run --auto-servernum node matrix_traffic.js work=2
